<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Fond carré gradient indigo→violet, coins arrondis -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>
  <!-- Symbole V : entonnoir de prospection (large en haut, focalisé en bas) -->
  <!-- Branche gauche du V -->
  <path d="M7 6.5 L 15.5 21" stroke="white" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Branche droite du V -->
  <path d="M25 6.5 L 16.5 21" stroke="white" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Diamant au point de convergence (viseur / cible) — continuité brand -->
  <rect x="13.5" y="22" width="5" height="5" fill="white" transform="rotate(45 16 24.5)"/>
</svg>
